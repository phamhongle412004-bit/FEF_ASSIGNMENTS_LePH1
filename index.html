<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopLite - Trang Chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="index.html">ShopLite</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Trang chủ</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center me-3">
                    <a class="nav-link text-white px-3" href="register.html" id="nav-register-btn">Đăng ký</a>
                    
                    <div class="dropdown d-none" id="nav-user-dropdown">
                        <button class="btn btn-link text-white text-decoration-none dropdown-toggle d-flex align-items-center gap-2 p-0" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
                            <div id="nav-user-avatar" class="rounded-circle bg-warning text-dark fw-bold d-flex align-items-center justify-content-center" style="width: 35px; height: 35px; font-size: 0.9rem;">
                                U
                            </div>
                            <span id="nav-user-name" class="small">Tài khoản</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" aria-labelledby="userMenu">
                            <li><a class="dropdown-item small py-2" href="#"><i class="bi bi-person me-2"></i>Thông tin tài khoản</a></li>
                            <li><a class="dropdown-item small py-2" href="#"><i class="bi bi-gear me-2"></i>Cài đặt</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><button class="dropdown-item small py-2 text-danger" id="nav-logout-btn"><i class="bi bi-box-arrow-right me-2"></i>Đăng xuất</button></li>
                        </ul>
                    </div>
                </div>
                
                <div class="d-flex">
                    <a href="cart.html" class="btn btn-outline-light position-relative">
                        <i class="bi bi-cart3"></i> Giỏ hàng
                        <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <header class="bg-light py-5 border-bottom mb-4">
        <div class="container text-center py-4">
            <h1 class="display-4 fw-bold text-dark">Welcome to ShopLite</h1>
            <p class="lead text-muted">Your one-stop shop for all your shopping needs!</p>
            <a href="#product-section" class="btn btn-warning btn-lg fw-bold px-4">Mua sắm ngay</a>
        </div>
    </header>

    <section class="container mb-4">
        <div class="row g-3 bg-white p-3 rounded shadow-sm">
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text bg-transparent"><i class="bi bi-search"></i></span>
                    <input type="text" id="search-input" class="form-control" placeholder="Tìm kiếm sản phẩm...">
                </div>
            </div>
            <div class="col-md-4">
                <select id="category-select" class="form-select">
                    <option value="">Tất cả danh mục</option>
                    </select>
            </div>
            <div class="col-md-3">
                <select id="sort-select" class="form-select">
                    <option value="">Sắp xếp mặc định</option>
                    <option value="price-asc">Giá: Thấp đến Cao</option>
                    <option value="price-desc">Giá: Cao đến Thấp</option>
                </select>
            </div>
        </div>
    </section>

    <main class="container mb-5 flex-grow-1" id="product-section">
        <h2 class="text-center mb-4 fw-bold">Sản phẩm nổi bật</h2>
        
        <div id="loading-state" class="text-center py-5">
            <div class="spinner-border text-warning" role="status">
                <span class="visually-hidden">Đang tải...</span>
            </div>
            <p class="mt-2 text-muted">Đang tải danh sách sản phẩm...</p>
        </div>

        <div id="error-state" class="alert alert-danger text-center d-none" role="alert">
            <i class="bi bi-exclamation-triangle-fill fs-4 me-2"></i>
            Không thể tải dữ liệu sản phẩm. Vui lòng thử lại sau!
        </div>

        <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4" id="product-grid">
            </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <p class="mb-0">&copy; 2026 ShopLite </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
