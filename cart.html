<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopLite - Giỏ Hàng</title> 
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning d-flex align-items-center gap-2 fs-3" href="index.html">
                <i class="bi bi-bag-heart-fill text-warning"></i>
                <span class="text-white">Shop</span><span class="text-warning">Lite</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link fw-semibold d-flex align-items-center gap-1" href="index.html" title="Trang chủ">
                            <i class="bi bi-house-door-fill fs-5"></i>
                            <span class="d-lg-none">Trang chủ</span>
                        </a>
                    </li>
                </ul>

                <div class="d-flex align-items-center me-3">
                    <button class="nav-link text-white px-2 border-0 bg-transparent small fw-semibold" data-bs-toggle="modal" data-bs-target="#loginModal" id="nav-login-btn">Đăng nhập</button>
                    <span class="text-secondary mx-2" id="nav-auth-divider">|</span>
                    <a class="nav-link text-white px-2 small fw-semibold" href="register.html" id="nav-register-btn">Đăng ký</a>
                    
                    <div class="dropdown d-none" id="nav-user-dropdown">
                        <button class="btn btn-link text-white text-decoration-none dropdown-toggle d-flex align-items-center gap-2 p-0" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
                            <div id="nav-user-avatar" class="rounded-circle bg-warning text-dark fw-bold d-flex align-items-center justify-content-center" style="width: 35px; height: 35px; font-size: 0.9rem;">
                                U
                            </div>
                            <span id="nav-user-name" class="small">Tài khoản</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" aria-labelledby="userMenu">
                            <li><a class="dropdown-item small py-2" href="#"><i class="bi bi-person me-2"></i>Thông tin tài khoản</a></li>
                            <li><a class="dropdown-item small py-2" href="#"><i class="bi bi-gear me-2"></i>Cài đặt</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><button class="dropdown-item small py-2 text-danger" id="nav-logout-btn"><i class="bi bi-box-arrow-right me-2"></i>Đăng xuất</button></li>
                        </ul>
                    </div>
                </div>
                
                <div class="d-flex">
                    <a href="cart.html" class="btn btn-warning position-relative d-flex align-items-center gap-2 fw-bold px-3 border-0 shadow-sm" style="background-color: #ffc107; color: #212529;">
                        <i class="bi bi-cart3 fs-5"></i> 
                        <span>Giỏ hàng</span>
                        <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-2 border-dark" style="font-size: 0.75rem;">
                            0
                        </span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title fw-bold" id="loginModalLabel"><i class="bi bi-shield-lock-fill me-2 text-warning"></i>Đăng Nhập</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="login-error-msg" class="alert alert-danger text-center small d-none" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-1"></i> Email hoặc mật khẩu không chính xác!
                    </div>
                    <form id="navbar-login-form">
                        <div class="mb-3">
                            <label for="modal-email" class="form-label small fw-bold">Địa chỉ Email</label>
                            <input type="email" class="form-control" id="modal-email" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label for="modal-password" class="form-label small fw-bold">Mật khẩu</label>
                            <input type="password" class="form-control" id="modal-password" placeholder="Nhập mật khẩu" required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 fw-bold py-2 shadow-sm">Xác Nhận Đăng Nhập</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <main class="container my-5 flex-grow-1">
        <h2 class="mb-4 fw-bold text-dark"><i class="bi bi-bag-check-fill text-warning me-2"></i>Giỏ hàng của bạn</h2>
        
        <div class="row g-4">
            <div class="col-lg-8" id="cart-container">
                <div class="text-center py-5 bg-white rounded shadow-sm border">
                    <i class="bi bi-cart-x display-1 text-muted"></i>
                    <p class="mt-3 fs-5 text-muted fw-semibold">Giỏ hàng của bạn đang trống.</p>
                    <a href="index.html" class="btn btn-warning fw-bold px-4 shadow-sm">Tiếp tục mua sắm</a>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card p-4 shadow-sm border">
                    <h4 class="mb-3 fw-bold text-dark">Tóm tắt đơn hàng</h4>
                    <hr>
                    <div class="d-flex justify-content-between mb-4 fs-5 fw-bold">
                        <span class="text-secondary">Tổng tiền:</span>
                        <span id="cart-total" class="text-danger fs-4">$0.00</span>
                    </div>
                    <button class="btn btn-warning w-100 fw-bold py-2 shadow-sm fs-5" id="btn-checkout">Thanh toán ngay</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-secondary text-center py-4 mt-auto border-top border-secondary">
        <p class="mb-0 small text-white-50">&copy; 2026 ShopLite </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
